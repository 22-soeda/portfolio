<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio - 添田 悠介</title>
  <link href="./output.css" rel="stylesheet">
  <style>
  /* ▼ 1. フォントファイルの読み込み ▼ */
  @font-face {
    font-family: 'CorporateLogo';
    src: url('../fonts/Corporate-Logo-Medium-ver3.otf') format('opentype'); 
    font-weight: normal;
    font-style: normal;
  }

  /* ▼ 2. ページ全体にコーポレートロゴフォントを適用 ▼ */
  body {
    font-family: 'CorporateLogo', sans-serif !important;
  }

  /* ▼ 3. フォントサイズの定数定義（全ページ共通） ▼ */
  :root {
    --size-name: 2.4rem;       /* 氏名 */
    --size-heading: 1.5rem;    /* セクション見出し */
    --size-title: 2.2rem;      /* プロジェクトのタイトル */
    --size-body: 0.95rem;      /* 本文の基本サイズ */
    --size-small: 0.95rem;     /* 補足テキストや詳細説明 */
    --size-timeline: 0.85rem;   /* タイムラインの年・月 */
    --size-caption: 0.9rem;    /* 画像キャプション */
    --size-tiny: 0.7rem;    /* 画像キャプション */
  }

  /* ▼ 4. 印刷・A4ページ共通レイアウト ▼ */
  .a4-page {
      width: 210mm;
      height: 297mm;        /* 高さをA4ぴったりに完全固定 */
      overflow: hidden;     /* 枠（297mm）を超えた要素は隠す（次ページに送らない） */
      margin: 0 auto;
      background: white;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      box-sizing: border-box;
      margin-bottom: 20px;
    }

    @media print {
      body {
        margin: 0;
        padding: 0;
      }
      .a4-page {
        box-shadow: none;
        margin: 0;
        page-break-after: always;
        break-after: page;
        margin-bottom: 0;
      }
      @page {
        size: A4 portrait;
        margin: 0 !important;
      }
    }
  </style>
</head>
<body class="bg-gray-200 py-8 print:py-0 print:bg-white text-gray-700 leading-relaxed">
